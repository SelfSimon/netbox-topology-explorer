name: Publish Python Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository to publish to'
        required: true
        default: 'testpypi'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine ruff black pytest
      - name: Lint and format checks
        run: ruff check . && black --check .
      - name: Run tests
        run: |
          pip install -e '.[dev]'
          pytest -q
      - name: Build distributions
        run: python -m build

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install twine
        run: python -m pip install --upgrade pip twine
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: python -m twine upload --repository testpypi dist/*

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi') }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
